{% extends "base.html" %}

{% block content %}
<div class="blog-container">
    <h1 class="blog-title">Blog</h1>

    <div class="coming-soon-wrapper" style="text-align: center; padding: 100px 20px;">
        <h2 style="font-size: 2rem; font-weight: 200; color: var(--accent-red); margin-top: 10px;">
            Coming Soon...
        </h2>
    </div>

    <div class="blog-posts-list">
        {% for post in Posts %}
        <article class="blog-post-item"
            style="margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border-color);">

            <time class="skill-tag" style="display: inline-block; margin-bottom: 0.75rem;">
                {{ post.date | date(format="%Y-%m-%d") }}
            </time>

            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">
                <a href="/blog/{{ post.slug }}" class="company-name" style="text-decoration: none;">
                    {{ post.title }}
                </a>
            </h2>

            <p class="about-content-dark" style="color: var(--text-muted); margin-bottom: 1rem;">
                {{ post.excerpt }}
            </p>

            <div class="post-meta" style="display: flex; gap: 0.5rem;">
                <span class="skill-tag" style="background: transparent; border: 1px solid var(--border-color);">
                    {{ post.category }}
                </span>
                <span class="skill-tag post-status-{{ post.status }}">
                    {{ post.status }}
                </span>
            </div>
        </article>
        {% endfor %}
    </div>
</div>
{% endblock content %}
